storage:
  type: sqlite
  path: /data/data.db

alerting:
  homeassistant:
    url: "http://192.168.1.5:8123"  # URL of your HomeAssistant instance
    token: "${HA_TOKEN}"  # Long-lived access token from HomeAssistant

security:
  basic:
    username: "ryan"
    password-bcrypt-base64: "JDJhJDEyJGZlS3dqeHhVdjFWUmx0ZmVMWks1VC5PNEx0empZbUlES1U4M21YRXlCd0dKbmhKd3pxR0RD"

endpoints:
  - name: WAN Connectivity
    group: network
    url: "http://connectivitycheck.gstatic.com/generate_204"
    interval: 30s
    conditions:
      - "[STATUS] == 204"
    alerts:
      - type: homeassistant
        enabled: true
        send-on-resolved: true
        failure-threshold: 2
        success-threshold: 2

  - name: Pi-hole
    group: infrastructure
    url: "https://pihole.cloud-vii.net/admin/"
    interval: 30s
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: homeassistant
        enabled: true
        send-on-resolved: true
        failure-threshold: 2
        success-threshold: 2

  - name: Home Assistant
    group: infrastructure
    url: "https://home.cloud-vii.net"
    interval: 30s
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: homeassistant
        enabled: true
        send-on-resolved: true
        failure-threshold: 2
        success-threshold: 2